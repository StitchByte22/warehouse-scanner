<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 20px;
        }

        #reader {
            width: 300px;
            margin: auto;
        }

        #result {
            margin-top: 30px;
            font-size: 22px;
        }
    </style>

</head>

<body>

<h1>📦 Warehouse Scanner</h1>

<p>Scan picking list barcode:</p>

<div id="reader"></div>

<div id="result"></div>


<script>
let processing = false;
let lastScanned = "";

function onScanSuccess(decodedText, decodedResult) {

    // Ignore duplicate scans
    if (processing || decodedText === lastScanned) {
        return;
    }

    processing = true;
    lastScanned = decodedText;

    // Pause camera immediately
    html5QrcodeScanner.pause(true);


    document.getElementById("result").innerHTML =
        "⏳ Processing order: " + decodedText;


    fetch("YOUR_MAKE_WEBHOOK_URL", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            orderNumber: decodedText
        })
    })
    .then(response => response.text())
    .then(data => {

        document.getElementById("result").innerHTML =
        "✅ DONE<br><br>Order " + decodedText + " updated";

    })
    .catch(error => {

        document.getElementById("result").innerHTML =
        "❌ ERROR<br><br>" + decodedText;

    });


    // Wait before allowing another scan
    setTimeout(() => {

        processing = false;
        lastScanned = "";

        html5QrcodeScanner.resume();


        document.getElementById("result").innerHTML =
        "📦 Scan next barcode";

    }, 4000);

}


let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250
    }
);

html5QrcodeScanner.render(onScanSuccess);

</script>


</body>
</html>
