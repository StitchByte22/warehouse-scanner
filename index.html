<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 20px;
        }

        #reader {
            width: 300px;
            margin: auto;
        }

        #result {
            margin-top: 30px;
            font-size: 22px;
        }
    </style>

</head>

<body>

<h1>📦 Warehouse Scanner</h1>

<p>Scan picking list barcode:</p>

<div id="reader"></div>

<div id="result"></div>


<script>
let processing = false;

function onScanSuccess(decodedText, decodedResult) {

    if (processing) {
        return;
    }

    processing = true;

    // Pause the camera scanner immediately
    html5QrcodeScanner.pause(true);

    document.getElementById("result").innerHTML =
        "⏳ Processing: " + decodedText;


    fetch("YOUR_MAKE_WEBHOOK_URL", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            orderNumber: decodedText
        })
    })
    .then(response => response.text())
    .then(data => {

        document.getElementById("result").innerHTML =
        "✅ Completed: " + decodedText;

    })
    .catch(error => {

        document.getElementById("result").innerHTML =
        "❌ Error sending scan";

    });


    setTimeout(() => {

        processing = false;

        html5QrcodeScanner.resume();

        document.getElementById("result").innerHTML =
        "📦 Ready for next scan";

    }, 3000);

}


let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250
    }
);

html5QrcodeScanner.render(onScanSuccess);

</script>


</body>
</html>
